name: Buscar vivienda

on:
  schedule:
    # Las horas de cron en GitHub son UTC. En horario de verano peninsular
    # (UTC+2), 06:10 UTC son las 08:10 de la mañana.
    #
    # Un solo barrido diario, y COMPLETO. Antes había dos cadencias (novedades a
    # diario, catálogo entero los domingos) porque se daba por hecha una cuota de
    # 100 peticiones al mes. El plan PRO de RapidAPI son 15.500, y un barrido
    # completo cuesta ~20-40: cabe entero todos los días gastando menos del 10%
    # del mes. Además de simplificar, arregla el fondo del asunto: las bajadas de
    # precio solo se ven en un barrido completo, así que antes podías enterarte
    # de una con seis días de retraso.
    - cron: "10 6 * * *"
  workflow_dispatch:
    inputs:
      fuente:
        description: "De dónde bajar los anuncios (elige 'mock' para probar el circuito sin API)"
        type: choice
        options: ["", "idealista", "mock"]
        default: ""
      mock_fase:
        description: "Solo con la fuente 'mock': 1 = primer día, 2 = al día siguiente (bajadas)"
        type: choice
        options: ["1", "2"]
        default: "1"
      purgar:
        description: "Borra TODO lo de esta fuente antes de buscar. Úsalo una vez con 'mock' al llegar los primeros datos reales"
        type: choice
        options: ["", "mock"]
        default: ""

# Dos ejecuciones a la vez se pisarían la base de datos y falsearían la cuota.
concurrency:
  group: buscar
  cancel-in-progress: false

env:
  # De dónde se bajan los anuncios. Ya apunta a la API real: mientras el proveedor
  # la tenga caída, el job termina en verde con un aviso y no toca nada, y el día
  # que la reactiven empieza a funcionar solo, sin que haya que venir a tocar nada.
  #
  # Para probar el circuito entero (buscar → puntuar → email → guardar la BD) sin
  # gastar API, lánzalo a mano con fuente = mock.
  #
  # Se puede fijar sin editar este fichero con una variable de repositorio FUENTE
  # en Settings → Secrets and variables → Actions → Variables.
  FUENTE: ${{ inputs.fuente || vars.FUENTE || 'idealista' }}

jobs:
  buscar:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # para poder empujar la BD a la rama `datos`

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Recuperar la base de datos de la ejecución anterior
        run: |
          mkdir -p data
          if git fetch origin datos 2>/dev/null; then
            git show origin/datos:listings.db > data/listings.db
            echo "BD recuperada: $(du -h data/listings.db | cut -f1)"
          else
            echo "No hay rama 'datos' todavía: se empieza de cero."
          fi

      # `--purgar` en local no sirve para esto: los datos de mentira viven en la BD
      # que genera GitHub, y cada importación te los traería de vuelta. Hay que
      # borrarlos aquí, en la BD de la rama `datos`, antes de que se mezclen con
      # los reales en la web.
      - name: Purgar una fuente
        if: inputs.purgar != ''
        run: |
          echo "::warning::Borrando TODO lo de la fuente '${{ inputs.purgar }}'"
          python main.py --purgar "${{ inputs.purgar }}"

      - name: Buscar, puntuar y notificar
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          echo "::notice::Fuente '$FUENTE', barrido completo"

          set +e
          python main.py --source "$FUENTE" --mock-fase "${{ inputs.mock_fase || 1 }}"
          CODIGO=$?
          set -e

          # 4 = el proveedor tiene la API apagada (405). No es un fallo nuestro y no
          # hay nada que arreglar, así que el job no se pone en rojo: si no, tendrías
          # un email de error cada mañana por algo que no depende de ti. No se ha
          # escrito nada; mañana se reintenta y, cuando vuelva, sigue solo.
          if [ $CODIGO -eq 4 ]; then
            echo "::warning::La API del proveedor sigue caída. No se ha tocado nada; se reintenta mañana."
            exit 0
          fi
          exit $CODIGO

      - name: Cuánta cuota queda
        if: always()
        run: python main.py --source "$FUENTE" --cuota

      - name: Guardar la base de datos
        if: always()   # aunque falle el email, el histórico no se pierde
        run: |
          test -f data/listings.db || exit 0
          git config user.name  "home-search bot"
          git config user.email "bot@users.noreply.github.com"

          # Rama huérfana de un solo commit: la BD es un binario y un commit
          # diario haría crecer el repositorio sin parar. Aquí solo vive la
          # última foto, y el histórico de precios ya está DENTRO de la BD.
          git checkout --orphan datos-nueva
          git rm -rf --cached . > /dev/null
          cp data/listings.db listings.db
          git add -f listings.db
          git commit -m "BD del $(date -u +%Y-%m-%d\ %H:%M) UTC · fuente $FUENTE"
          git push --force origin datos-nueva:datos
