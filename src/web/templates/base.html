<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}home-search{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <a href="/"><strong>home-search</strong></a>
    <a href="/mercado" class="sutil">mercado</a>
    <span class="sutil">{% block subtitulo %}{% endblock %}</span>
  </header>
  <main>
    {% block contenido %}{% endblock %}
  </main>

  <script>
    // HTMX no hace swap cuando la respuesta es 4xx/5xx: sin esto, un error deja
    // el "Cargando…" puesto para siempre y parece que la web se ha colgado.
    document.body.addEventListener("htmx:responseError", (e) => {
      e.detail.target.innerHTML =
        '<p class="aviso">Error ' + e.detail.xhr.status + " al pedir " +
        e.detail.requestConfig.path + ". Mira la consola de uvicorn.</p>";
    });
    document.body.addEventListener("htmx:sendError", (e) => {
      e.detail.target.innerHTML =
        '<p class="aviso">No hay conexión con el servidor. ¿Sigue vivo uvicorn?</p>';
    });

    // Una foto que no carga (anuncio retirado, CDN que nos bloquea) dejaría el
    // icono de imagen rota del navegador. Mejor un hueco discreto que diga por qué.
    // En fase de captura: los eventos 'error' de <img> no burbujean.
    document.body.addEventListener("error", (e) => {
      const img = e.target;
      if (img.tagName !== "IMG") return;
      const hueco = document.createElement("span");
      hueco.className = "sin-foto";
      hueco.textContent = "foto no disponible";
      img.replaceWith(hueco);
    }, true);
  </script>
</body>
</html>
